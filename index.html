<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 150px; height: 200px; perspective: 1500px; }
        .gallery { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; animation: rotate 20s linear infinite; }
        .gallery div { position: absolute; width: 150px; height: 200px; border: 2px solid gold; border-radius: 8px; overflow: hidden; }
        
        img { width: 100%; height: 100%; object-fit: cover; background: #222; }

        /* توزيع 10 صور بمسافة آمنة 250px */
        .gallery div:nth-child(1)  { transform: rotateY(0deg)   translateZ(250px); }
        .gallery div:nth-child(2)  { transform: rotateY(36deg)  translateZ(250px); }
        .gallery div:nth-child(3)  { transform: rotateY(72deg)  translateZ(250px); }
        .gallery div:nth-child(4)  { transform: rotateY(108deg) translateZ(250px); }
        .gallery div:nth-child(5)  { transform: rotateY(144deg) translateZ(250px); }
        .gallery div:nth-child(6)  { transform: rotateY(180deg) translateZ(250px); }
        .gallery div:nth-child(7)  { transform: rotateY(216deg) translateZ(250px); }
        .gallery div:nth-child(8)  { transform: rotateY(252deg) translateZ(250px); }
        .gallery div:nth-child(9)  { transform: rotateY(288deg) translateZ(250px); }
        .gallery div:nth-child(10) { transform: rotateY(324deg) translateZ(250px); }

        @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="gallery">
            <div><img src="1.jpg"></div>
            <div><img src="2.jpg"></div>
            <div><img src="3.jpg"></div>
            <div><img src="4.jpg"></div>
            <div><img src="5.jpg"></div>
            <div><img src="6.jpg"></div>
            <div><img src="7.jpg"></div>
            <div><img src="8.jpg"></div>
            <div><img src="9.jpحg"></div>
            <div><img src="10.jpg"></div>
        </div>
    </div>
</body>
</html>
